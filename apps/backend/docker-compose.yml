# Local Postgres for development (matches .env.example DATABASE_URL)
#
# Start: docker compose up -d
# Stop:  docker compose down
# Logs:  docker compose logs -f db

services:
  db:
    image: postgres:15-alpine
    container_name: medijournal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: medijournal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d medijournal"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
